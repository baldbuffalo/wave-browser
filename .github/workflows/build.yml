name: Build Wave Browser (WiiU)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitppc:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-utils zip

      - name: Build RPX and WUHB
        run: |
          #---------------------------------------
          # Environment variables
          #---------------------------------------
          export DEVKITPRO=/opt/devkitpro
          export DEVKITPPC=$DEVKITPRO/devkitPPC
          export WUT_ROOT=$DEVKITPRO/wut
          export PORTLIBS=$DEVKITPRO/portlibs/wiiu
          export PORTLIBS_PPC=$DEVKITPRO/portlibs/ppc
          export PATH=$DEVKITPPC/bin:$DEVKITPRO/tools/bin:$PATH

          #---------------------------------------
          # Clean previous builds
          #---------------------------------------
          make clean

          #---------------------------------------
          # Build project using all CPU cores
          #---------------------------------------
          make -j$(nproc)

          #---------------------------------------
          # Validate meta.xml exists
          #---------------------------------------
          if [ ! -f meta.xml ]; then
            echo "meta.xml missing!" && exit 1
          fi
          xmllint --noout meta.xml

          #---------------------------------------
          # Prepare release folder
          #---------------------------------------
          mkdir -p release/WaveBrowser
          cp wave_browser.wuhb release/WaveBrowser/
          cp meta.xml release/WaveBrowser/

          #---------------------------------------
          # Zip release folder
          #---------------------------------------
          pushd release
          zip -r WaveBrowser.zip WaveBrowser
          popd
        shell: sh -e {0}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: WaveBrowser
          path: release/WaveBrowser.zip
