name: Build Wave Browser (WiiU)

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build plugin via Docker
        run: |
          docker build -t wavebrowser-plugin-builder wave_browser/plugin/
          docker run --rm \
            -v "$PWD/wave_browser:/wave_browser" \
            wavebrowser-plugin-builder \
            sh -c "which elf2rpl && cd /wave_browser/plugin && make -j$(nproc) && ls -lh WaveBrowserRemote.wps"

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-wps
          path: wave_browser/plugin/WaveBrowserRemote.wps

  build:
    runs-on: ubuntu-latest
    needs: build-plugin
    container:
      image: devkitpro/devkitppc:latest
    env:
      DEVKITPRO: /opt/devkitpro
      DEVKITPPC: /opt/devkitpro/devkitPPC
      WUT_ROOT: /opt/devkitpro/wut
      PORTLIBS: /opt/devkitpro/portlibs/wiiu

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: apt-get update && apt-get install -y zip libxml2-utils python3

      - name: Install devkitPro WiiU libraries
        run: dkp-pacman -Sy --noconfirm wiiu-dev

      - name: Add devkitPro tools to PATH
        run: |
          echo "/opt/devkitpro/devkitPPC/bin" >> $GITHUB_PATH
          echo "/opt/devkitpro/tools/bin" >> $GITHUB_PATH

      - name: Fetch WebKit-WiiU library
        run: |
          echo "Attempting to fetch libWebKitWKC.a from webkit-wiiu nightly..."
          mkdir -p vendor/webkit-wiiu/lib
          # Try to download from the webkit-wiiu repo's latest CI artifact
          # Falls back gracefully — build continues in stub mode if not available
          curl -fsSL \
            "https://nightly.link/baldbuffalo/webkit-wiiu/workflows/build.yml/main/webkit-wiiu-lib.zip" \
            -o /tmp/webkit-wiiu-lib.zip 2>/dev/null && \
          unzip -q /tmp/webkit-wiiu-lib.zip -d /tmp/webkit-wiiu-lib 2>/dev/null && \
          find /tmp/webkit-wiiu-lib -name "*.a" -exec cp {} vendor/webkit-wiiu/lib/libWebKitWKC.a \; 2>/dev/null && \
          echo "WebKit-WiiU lib: FOUND ($(ls -lh vendor/webkit-wiiu/lib/libWebKitWKC.a 2>/dev/null | awk '{print $5}'))" || \
          echo "WebKit-WiiU lib: not available — building in stub mode"

        run: |
          mkdir -p vendor/minizip
          BASE="https://raw.githubusercontent.com/madler/zlib/v1.3.1/contrib/minizip"
          for f in ioapi.h ioapi.c unzip.h unzip.c; do
            curl -fsSL "$BASE/$f" -o "vendor/minizip/$f"
          done

      - name: Download font
        run: |
          FONT_URL=$(curl -s -A "Mozilla/4.0" "https://fonts.googleapis.com/css?family=Roboto:700" | grep -o 'https://[^)]*' | head -1)
          wget -q "$FONT_URL" -O wave_browser/font.ttf
          python3 -c "data=open('wave_browser/font.ttf','rb').read(); open('wave_browser/font_data.h','w').write('static const unsigned char font_data[]={'+','.join(str(b) for b in data)+'};\nstatic const unsigned int font_data_len='+str(len(data))+';\n')"

      - name: Build Wave Browser
        run: make clean && make -j$(nproc)

      - name: Validate meta.xml
        run: |
          if [ ! -f meta.xml ]; then echo "meta.xml missing!" && exit 1; fi
          xmllint --noout meta.xml

      - name: Prepare release folder
        run: |
          mkdir -p WaveBrowser
          cp WaveBrowser.wuhb WaveBrowser/
          cp meta.xml WaveBrowser/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WaveBrowser
          path: WaveBrowser/
