name: Build Wave Browser (WiiU)

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  # ── Plugin build ─────────────────────────────────────────────────────────────
  build-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build plugin via Docker
        run: |
          docker build -t wavebrowser-plugin-builder wave_browser/plugin/
          docker run --rm \
            -v "$PWD/wave_browser:/wave_browser" \
            wavebrowser-plugin-builder \
            sh -c "cd /wave_browser/plugin && make -j$(nproc) && ls -lh WaveBrowserRemote.wps"

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-wps
          path: wave_browser/plugin/WaveBrowserRemote.wps

  # ── Main app build ───────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: build-plugin
    container:
      image: devkitpro/devkitppc:latest
    env:
      DEVKITPRO: /opt/devkitpro
      DEVKITPPC: /opt/devkitpro/devkitPPC
      WUT_ROOT: /opt/devkitpro/wut
      PORTLIBS: /opt/devkitpro/portlibs/wiiu

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: apt-get update && apt-get install -y zip libxml2-utils python3

      - name: Install devkitPro WiiU libraries
        run: dkp-pacman -Sy --noconfirm wiiu-dev

      - name: Add devkitPro tools to PATH
        run: |
          echo "/opt/devkitpro/devkitPPC/bin" >> $GITHUB_PATH
          echo "/opt/devkitpro/tools/bin" >> $GITHUB_PATH

      - name: Download plugin binary
        uses: actions/download-artifact@v4
        with:
          name: plugin-wps
          path: wave_browser/plugin/

      - name: Vendor minizip source
        run: |
          mkdir -p vendor/minizip
          BASE="https://raw.githubusercontent.com/madler/zlib/v1.3.1/contrib/minizip"
          for f in ioapi.h ioapi.c unzip.h unzip.c; do
            curl -fsSL "$BASE/$f" -o "vendor/minizip/$f"
          done

      - name: Download font
        run: |
          FONT_URL=$(curl -s -A "Mozilla/4.0" "https://fonts.googleapis.com/css?family=Roboto:700" | grep -o 'https://[^)]*' | head -1)
          wget -q "$FONT_URL" -O wave_browser/font.ttf
          python3 -c "data=open('wave_browser/font.ttf','rb').read(); open('wave_browser/font_data.h','w').write('static const unsigned char font_data[]={'+','.join(str(b) for b in data)+'};\nstatic const unsigned int font_data_len='+str(len(data))+';\n')"

      - name: Embed plugin binary into header
        run: |
          python3 -c "
          data=open('wave_browser/plugin/WaveBrowserRemote.wps','rb').read()
          with open('wave_browser/plugin_data.h','w') as f:
              f.write('// Auto-generated\n')
              f.write('static const unsigned char plugin_wps_data[]={')
              f.write(','.join(str(b) for b in data))
              f.write('};\nstatic const unsigned int plugin_wps_len='+str(len(data))+';\n')
          print(f'Embedded {len(data)} bytes')
          "

      - name: Build Wave Browser
        run: make clean && make -j$(nproc) 2>&1 | tee /tmp/build.log; exit ${PIPESTATUS[0]}

      - name: Validate meta.xml
        run: |
          if [ ! -f meta.xml ]; then echo "meta.xml missing!" && exit 1; fi
          xmllint --noout meta.xml

      - name: Prepare release folder
        run: |
          mkdir -p WaveBrowser
          cp WaveBrowser.wuhb WaveBrowser/
          cp meta.xml WaveBrowser/
          cp wave_browser/plugin/WaveBrowserRemote.wps WaveBrowser/

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: WaveBrowser
          path: WaveBrowser/

      # Save build log as artifact regardless of outcome
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
          if-no-files-found: ignore

  # ── Status reporter (runs on ubuntu — has git) ───────────────────────────────
  report-status:
    runs-on: ubuntu-latest
    needs: [build-plugin, build]
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download build log
        uses: actions/download-artifact@v4
        with:
          name: build-log
          path: /tmp/
        continue-on-error: true

      - name: Write status to repo
        run: |
          # Determine overall result
          PLUGIN="${{ needs.build-plugin.result }}"
          BUILD="${{ needs.build.result }}"

          mkdir -p .build_status

          if [ "$PLUGIN" = "success" ] && [ "$BUILD" = "success" ]; then
            echo "SUCCESS" > .build_status/status.txt
            echo "" > .build_status/error.log
          else
            echo "FAILED" > .build_status/status.txt
            FAILED_JOB="unknown"
            [ "$PLUGIN" != "success" ] && FAILED_JOB="build-plugin"
            [ "$BUILD"   != "success" ] && FAILED_JOB="build"
            echo "job=$FAILED_JOB" >> .build_status/status.txt
            # Copy build log if present
            if [ -f /tmp/build.log ]; then
              tail -200 /tmp/build.log > .build_status/error.log
            else
              echo "no build log — check GitHub Actions UI for build-plugin errors" \
                > .build_status/error.log
            fi
          fi

          git config user.email "ci@wave-browser"
          git config user.name  "Wave Browser CI"
          git add .build_status/
          git diff --cached --quiet || \
            git commit -m "ci: build $(cat .build_status/status.txt) [skip ci]"
          git push origin HEAD:main
