name: Build Wave Browser (WiiU)

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitppc:latest

    env:
      DEVKITPRO: /opt/devkitpro
      DEVKITPPC: /opt/devkitpro/devkitPPC
      WUT_ROOT: /opt/devkitpro/wut
      PORTLIBS: /opt/devkitpro/portlibs/wiiu
      PATH: /opt/devkitpro/devkitPPC/bin:/opt/devkitpro/tools/bin:${{ env.PATH }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y zip libxml2-utils

      - name: Build Wave Browser
        run: |
          make clean
          make -j$(nproc)

      - name: Validate meta.xml
        run: |
          if [ ! -f meta.xml ]; then
            echo "meta.xml missing!" && exit 1
          fi
          xmllint --noout meta.xml

      - name: Prepare release
        run: |
          mkdir -p release/WaveBrowser
          cp WaveBrowser.wuhb release/WaveBrowser/
          cp meta.xml release/WaveBrowser/
          zip -r release/WaveBrowser.zip release/WaveBrowser

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WaveBrowser
          path: release/WaveBrowser.zip
