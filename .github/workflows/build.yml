name: Build Wave Browser (WiiU)

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitppc:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip libxml2-utils

      - name: Set environment variables
        run: |
          export DEVKITPRO=/opt/devkitpro
          export DEVKITPPC=$DEVKITPRO/devkitPPC
          export WUT_ROOT=$DEVKITPRO/wut
          export PORTLIBS=$DEVKITPRO/portlibs/wiiu
          export PATH=$DEVKITPPC/bin:$DEVKITPRO/tools/bin:$PATH

      - name: Build Wave Browser
        run: |
          make clean
          make -j$(nproc)
          
      - name: Validate meta.xml
        run: |
          if [ ! -f meta.xml ]; then
            echo "meta.xml missing!" && exit 1
          fi
          xmllint --noout meta.xml

      - name: Prepare release
        run: |
          mkdir -p release/WaveBrowser
          cp WaveBrowser.wuhb release/WaveBrowser/
          cp meta.xml release/WaveBrowser/
          pushd release
          zip -r WaveBrowser.zip WaveBrowser
          popd

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: WaveBrowser
          path: release/WaveBrowser.zip
