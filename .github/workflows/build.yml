name: Build Wave Browser (WiiU)

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitppc:latest

    env:
      DEVKITPRO: /opt/devkitpro
      DEVKITPPC: /opt/devkitpro/devkitPPC
      WUT_ROOT: /opt/devkitpro/wut
      PORTLIBS: /opt/devkitpro/portlibs/wiiu

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y zip libxml2-utils zstd

      - name: Vendor minizip from MSYS2 package
        run: |
          # Resolve the latest package filename from the MSYS2 package page
          PKG_URL=$(curl -sL "https://packages.msys2.org/packages/mingw-w64-x86_64-minizip" \
            | grep -o 'https://mirror.msys2.org/mingw/mingw64/mingw-w64-x86_64-minizip-[^"]*\.pkg\.tar\.zst' \
            | head -1)
          echo "Downloading: $PKG_URL"
          curl -sL "$PKG_URL" -o minizip.pkg.tar.zst
          mkdir -p minizip_pkg
          tar -I zstd -xf minizip.pkg.tar.zst -C minizip_pkg
          # Copy headers into the vendored dir
          mkdir -p wave_browser/minizip
          cp minizip_pkg/mingw64/include/minizip/ioapi.h wave_browser/minizip/
          cp minizip_pkg/mingw64/include/minizip/unzip.h wave_browser/minizip/
          # Fetch matching .c sources from the same upstream zlib version
          ZLIB_VER=$(curl -sL "https://packages.msys2.org/packages/mingw-w64-x86_64-minizip" \
            | grep -o 'mingw-w64-x86_64-minizip-[0-9.]*' | head -1 \
            | grep -o '[0-9][0-9.]*' | head -1)
          echo "Upstream zlib version: $ZLIB_VER"
          BASE="https://raw.githubusercontent.com/madler/zlib/v${ZLIB_VER}/contrib/minizip"
          curl -sL "$BASE/ioapi.c" -o wave_browser/minizip/ioapi.c
          curl -sL "$BASE/unzip.c" -o wave_browser/minizip/unzip.c
          rm -rf minizip.pkg.tar.zst minizip_pkg

      - name: Add devkitPro tools to PATH
        run: |
          echo "/opt/devkitpro/devkitPPC/bin" >> $GITHUB_PATH
          echo "/opt/devkitpro/tools/bin" >> $GITHUB_PATH

      - name: Download font
        run: |
          FONT_URL=$(curl -s -A "Mozilla/4.0" "https://fonts.googleapis.com/css?family=Roboto:700" | grep -o 'https://[^)]*' | head -1)
          wget -q "$FONT_URL" -O wave_browser/font.ttf
          python3 -c "data=open('wave_browser/font.ttf','rb').read(); open('wave_browser/font_data.h','w').write('static const unsigned char font_data[]={'+','.join(str(b) for b in data)+'};\nstatic const unsigned int font_data_len='+str(len(data))+';\n')"

      - name: Build Wave Browser
        run: |
          make clean
          make -j$(nproc)

      - name: Validate meta.xml
        run: |
          if [ ! -f meta.xml ]; then
            echo "meta.xml missing!" && exit 1
          fi
          xmllint --noout meta.xml

      - name: Prepare release folder
        run: |
          mkdir -p WaveBrowser
          cp WaveBrowser.wuhb WaveBrowser/
          cp meta.xml WaveBrowser/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: WaveBrowser
          path: WaveBrowser/
