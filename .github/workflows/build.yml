name: Build Wave Browser (WiiU)

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  # ── Step 1: Build the Aroma plugin ───────────────────────────────────────────
  build-plugin:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/wiiu-env/devkitppc:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install WUPS
        run: |
          # wiiu-env image ships dkp-pacman with their own repo pre-configured
          # Try dkp-pacman first (fastest), fall back to direct pkg install
          dkp-pacman -Sy --noconfirm wiiu-wups 2>/dev/null && echo "installed via pacman" && exit 0

          # Fallback: install the .pkg.tar.zst directly from a known release
          # Find latest tag via redirect (no API rate limit)
          LATEST=$(curl -sI "https://github.com/wiiu-env/WiiUPluginSystem/releases/latest" \
            | grep -i "^location:" | sed 's|.*/tag/||' | tr -d '[:space:]')
          echo "WUPS version: $LATEST"

          # Download the pacman package for that tag
          PKG_URL="https://github.com/wiiu-env/WiiUPluginSystem/releases/download/${LATEST}/wups-${LATEST#v}-1-any.pkg.tar.zst"
          echo "Trying: $PKG_URL"
          curl -fL "$PKG_URL" -o /tmp/wups.pkg.tar.zst \
            || curl -fL "https://github.com/wiiu-env/WiiUPluginSystem/releases/download/${LATEST}/wups-1-any.pkg.tar.zst" \
                    -o /tmp/wups.pkg.tar.zst

          # Install the package
          dkp-pacman --noconfirm -U /tmp/wups.pkg.tar.zst

      - name: Verify WUPS headers present
        run: ls /opt/devkitpro/wups/include/

      - name: Build Aroma plugin
        run: |
          cd wave_browser/plugin
          make -j$(nproc)
          ls -lh WaveBrowserRemote.wps

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-wps
          path: wave_browser/plugin/WaveBrowserRemote.wps

  # ── Step 2: Build the main app ───────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: build-plugin
    container:
      image: devkitpro/devkitppc:latest

    env:
      DEVKITPRO: /opt/devkitpro
      DEVKITPPC: /opt/devkitpro/devkitPPC
      WUT_ROOT: /opt/devkitpro/wut
      PORTLIBS: /opt/devkitpro/portlibs/wiiu

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: apt-get update && apt-get install -y zip libxml2-utils python3

      - name: Install devkitPro WiiU libraries
        run: dkp-pacman -Sy --noconfirm wiiu-dev

      - name: Add devkitPro tools to PATH
        run: |
          echo "/opt/devkitpro/devkitPPC/bin" >> $GITHUB_PATH
          echo "/opt/devkitpro/tools/bin" >> $GITHUB_PATH

      - name: Download plugin binary
        uses: actions/download-artifact@v4
        with:
          name: plugin-wps
          path: wave_browser/plugin/

      - name: Vendor minizip source
        run: |
          mkdir -p vendor/minizip
          BASE="https://raw.githubusercontent.com/madler/zlib/v1.3.1/contrib/minizip"
          for f in ioapi.h ioapi.c unzip.h unzip.c; do
            curl -fsSL "$BASE/$f" -o "vendor/minizip/$f"
          done

      - name: Download font
        run: |
          FONT_URL=$(curl -s -A "Mozilla/4.0" "https://fonts.googleapis.com/css?family=Roboto:700" | grep -o 'https://[^)]*' | head -1)
          wget -q "$FONT_URL" -O wave_browser/font.ttf
          python3 -c "data=open('wave_browser/font.ttf','rb').read(); open('wave_browser/font_data.h','w').write('static const unsigned char font_data[]={'+','.join(str(b) for b in data)+'};\nstatic const unsigned int font_data_len='+str(len(data))+';\n')"

      - name: Embed plugin binary into header
        run: |
          python3 -c "
          data=open('wave_browser/plugin/WaveBrowserRemote.wps','rb').read()
          with open('wave_browser/plugin_data.h','w') as f:
              f.write('// Auto-generated\n')
              f.write('static const unsigned char plugin_wps_data[]={')
              f.write(','.join(str(b) for b in data))
              f.write('};\nstatic const unsigned int plugin_wps_len='+str(len(data))+';\n')
          print(f'Embedded {len(data)} bytes')
          "

      - name: Build Wave Browser
        run: make clean && make -j$(nproc)

      - name: Validate meta.xml
        run: |
          if [ ! -f meta.xml ]; then echo "meta.xml missing!" && exit 1; fi
          xmllint --noout meta.xml

      - name: Prepare release folder
        run: |
          mkdir -p WaveBrowser
          cp WaveBrowser.wuhb WaveBrowser/
          cp meta.xml WaveBrowser/
          cp wave_browser/plugin/WaveBrowserRemote.wps WaveBrowser/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WaveBrowser
          path: WaveBrowser/
