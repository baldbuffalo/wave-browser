name: Build Wave Browser (WiiU)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitppc:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-utils zip

      - name: Build Wave Browser
        run: |
          export DEVKITPRO=/opt/devkitpro
          export DEVKITPPC=$DEVKITPRO/devkitPPC
          export WUT_ROOT=$DEVKITPRO/wut
          export PORTLIBS=$DEVKITPRO/portlibs/wiiu
          export PORTLIBS_PPC=$DEVKITPRO/portlibs/ppc
          export PATH=$DEVKITPPC/bin:$DEVKITPRO/tools/bin:$PATH

          make clean
          make -j$(nproc)

          # Prepare release
          mkdir -p release/WaveBrowser
          cp wave_browser.elf release/WaveBrowser/
          cp meta.xml release/WaveBrowser/

          pushd release
          zip -r WaveBrowser.zip WaveBrowser
          popd

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: WaveBrowser
          path: release/WaveBrowser.zip
